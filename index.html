<script>
// ============================================================
// UTILITIES — Números y fechas en letra (Spanish legal format)
// ============================================================
const UNIDADES = ['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve'];
const DECENAS = ['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
const CENTENAS = ['','cien','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS_LETRA = {1:'primero',2:'dos',3:'tres',4:'cuatro',5:'cinco',6:'seis',7:'siete',8:'ocho',9:'nueve',10:'diez',11:'once',12:'doce',13:'trece',14:'catorce',15:'quince',16:'dieciséis',17:'diecisiete',18:'dieciocho',19:'diecinueve',20:'veinte',21:'veintiuno',22:'veintidós',23:'veintitrés',24:'veinticuatro',25:'veinticinco',26:'veintiséis',27:'veintisiete',28:'veintiocho',29:'veintinueve',30:'treinta',31:'treinta y uno'};

function convertirMenorMil(n) {
  if (n === 0) return '';
  if (n < 20) return UNIDADES[n];
  if (n < 100) {
    const d = Math.floor(n/10), u = n%10;
    if (u === 0) return DECENAS[d];
    if (d === 2) return 'veinti' + UNIDADES[u];
    return DECENAS[d] + ' y ' + UNIDADES[u];
  }
  const c = Math.floor(n/100), r = n%100;
  if (n === 100) return 'cien';
  if (c === 1) return r === 0 ? 'cien' : 'ciento ' + convertirMenorMil(r);
  return CENTENAS[c] + (r > 0 ? ' ' + convertirMenorMil(r) : '');
}

function numeroALetra(num, femenino = false) {
  if (num === 0) return 'cero';
  if (isNaN(num)) return '';
  const neg = num < 0;
  const n = Math.abs(Math.floor(num));
  let r = '';
  if (n >= 1000000) {
    const m = Math.floor(n/1000000), re = n%1000000;
    r = m === 1 ? 'un millón' : convertirMenorMil(m) + ' millones';
    if (re > 0) r += ' ' + numeroALetra(re, femenino);
  } else if (n >= 1000) {
    const m = Math.floor(n/1000), re = n%1000;
    r = m === 1 ? 'mil' : convertirMenorMil(m) + ' mil';
    if (re > 0) r += ' ' + convertirMenorMil(re);
  } else {
    r = convertirMenorMil(n);
  }
  if (femenino) { r = r.replace(/\buno\b/g,'una').replace(/\bveintiuno\b/g,'veintiuna'); }
  return neg ? 'menos ' + r : r;
}

function monedaALetra(cantidad) {
  const e = Math.floor(cantidad);
  const c = Math.round((cantidad - e) * 100);
  return numeroALetra(e) + ' pesos ' + c.toString().padStart(2,'0') + '/100 moneda nacional';
}

function caracteresALetra(texto) {
  const MAP = {A:'A',B:'B',C:'C',D:'D',E:'E',F:'F',G:'G',H:'H',I:'I',J:'J',K:'K',L:'L',M:'M',N:'N','Ñ':'Ñ',O:'O',P:'P',Q:'Q',R:'R',S:'S',T:'T',U:'U',V:'V',W:'doble u',X:'X',Y:'Y',Z:'Z','0':'cero','1':'uno','2':'dos','3':'tres','4':'cuatro','5':'cinco','6':'seis','7':'siete','8':'ocho','9':'nueve'};
  return (texto||'').toUpperCase().split('').map(c => MAP[c]||c).join(', ');
}

function anioALetra(a) {
  if (a >= 2000 && a < 2100) {
    const d = a - 2000;
    return d === 0 ? 'dos mil' : 'dos mil ' + decenaSimpleALetra(d);
  }
  if (a >= 1900 && a < 2000) {
    const d = a - 1900;
    return d === 0 ? 'mil novecientos' : 'mil novecientos ' + decenaSimpleALetra(d);
  }
  return a.toString();
}
function decenaSimpleALetra(n) {
  if (n < 20) return UNIDADES[n];
  const d = Math.floor(n/10), u = n%10;
  if (u === 0) return DECENAS[d];
  if (d === 2) return 'veinti' + UNIDADES[u];
  return DECENAS[d] + ' y ' + UNIDADES[u];
}

function fechaALetra(fechaStr) {
  const d = new Date(fechaStr + 'T12:00:00');
  const dia = d.getDate(), mes = d.getMonth(), anio = d.getFullYear();
  return (DIAS_LETRA[dia]||dia) + ' de ' + MESES[mes] + ' de ' + anioALetra(anio);
}

function parsearFechaInstrumento(fechaISO) {
  const d = new Date(fechaISO + 'T12:00:00');
  const dia = d.getDate(), mes = d.getMonth(), anio = d.getFullYear();
  return {
    dia: dia.toString(), mes: MESES[mes], anio: anio.toString(),
    diaLetra: DIAS_LETRA[dia]||dia.toString(),
    mesLetra: MESES[mes],
    anioLetra: anioALetra(anio),
    completa: fechaALetra(fechaISO)
  };
}

function formatearEstadoCivil(ec, genero) {
  const ec2 = (ec||'').toLowerCase().trim();
  const mapa = {
    masculino: {soltero:'soltero',soltera:'soltero',casado:'casado',casada:'casado',divorciado:'divorciado',divorciada:'divorciado',viudo:'viudo',viuda:'viudo','unión libre':'en unión libre','union libre':'en unión libre'},
    femenino:  {soltero:'soltera',soltera:'soltera',casado:'casada',casada:'casada',divorciado:'divorciada',divorciada:'divorciada',viudo:'viuda',viuda:'viuda','unión libre':'en unión libre','union libre':'en unión libre'},
  };
  return (mapa[genero]||mapa.masculino)[ec2] || ec;
}

function generarTextoCuGenerales(d) {
  const fem = d.genero === 'femenino';
  const orig = fem ? 'originaria' : 'originario';
  const fechaLetra = fechaALetra(d.fecha_nacimiento);
  const ec = formatearEstadoCivil(d.estado_civil, d.genero);
  const dom = [d.domicilio_calle, d.domicilio_numero ? 'número '+d.domicilio_numero : '', d.domicilio_colonia ? 'Colonia '+d.domicilio_colonia : '', d.domicilio_cp ? 'Código Postal '+d.domicilio_cp : '', d.domicilio_ciudad ? 'en la ciudad de '+d.domicilio_ciudad : '', d.domicilio_estado].filter(Boolean).join(', ');
  const claveLetra = d.clave_elector ? ', con Clave de Elector: ' + caracteresALetra(d.clave_elector) : '';
  const curpLetra = caracteresALetra(d.curp||'');
  const rfcLetra = caracteresALetra(d.rfc||'');

  return d.nombre_completo.toUpperCase() +
    ', de nacionalidad ' + d.nacionalidad +
    ', de padres ' + (d.nacionalidad_padres||'mexicanos') +
    ', ' + orig + ' de ' + d.lugar_nacimiento + ', lugar donde nació el día ' + fechaLetra +
    ', ' + ec + ', ' + d.profesion +
    ', con domicilio en ' + dom +
    ', quien se identifica con ' + (d.tipo_identificacion||'Credencial para Votar') + ' vigente expedida por ' + (d.autoridad_identificacion||'el Instituto Nacional Electoral') +
    claveLetra +
    ', la cual agrego en copia fotostática al apéndice de este instrumento con la letra que le "' + (d.anexo_identificacion||'D') + '", certificando que dicha copia es reproducción fiel y exacta de su original con el que fue debidamente cotejada' +
    '; con Clave Única de Registro de Población: ' + curpLetra +
    '; y con Registro Federal de Contribuyentes: ' + rfcLetra + '.';
}

// ============================================================
// STORAGE
// ============================================================
const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)||'[]'); } catch(e) { return []; } },
  getObj: k => { try { return JSON.parse(localStorage.getItem(k)||'null'); } catch(e) { return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  getOne: (k,id) => DB.get(k).find(i => i.id === id),
  save: (k, item) => {
    const items = DB.get(k);
    const idx = items.findIndex(i => i.id === item.id);
    if (idx >= 0) items[idx] = item; else items.push(item);
    DB.set(k, items);
    return item;
  },
  del: (k, id) => DB.set(k, DB.get(k).filter(i => i.id !== id))
};

function uid() {
  return crypto.randomUUID ? crypto.randomUUID() :
    'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random()*16|0;
      return (c==='x'?r:(r&0x3|0x8)).toString(16);
    });
}

// ============================================================
// AUTH
// ============================================================
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function seedUsuarios() {
  if (DB.get('notaria_users').length > 0) return;
  const users = [
    { id: uid(), name:'Admin', email:'admin@notaria149.mx', password: await sha256('Admin@Notaria2024'), role:'ADMIN', active:true },
    { id: uid(), name:'Capturista', email:'capturista@notaria149.mx', password: await sha256('Capturista@2024'), role:'CAPTURISTA', active:true },
    { id: uid(), name:'Consulta', email:'consulta@notaria149.mx', password: await sha256('Consulta@2024'), role:'CONSULTA', active:true },
  ];
  DB.set('notaria_users', users);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  errEl.classList.add('hidden');
  if (!email || !pass) { errEl.textContent='Ingresa correo y contraseña'; errEl.classList.remove('hidden'); return; }
  btn.innerHTML = '<span class="spinner"></span> Verificando...';
  btn.disabled = true;
  try {
    const hash = await sha256(pass);
    const users = DB.get('notaria_users');
    const user = users.find(u => u.email === email && u.password === hash && u.active);
    if (!user) { errEl.textContent='Credenciales incorrectas o usuario inactivo'; errEl.classList.remove('hidden'); return; }
    DB.set('notaria_session', user);
    APP.user = user;
    showApp();
    navigate('dashboard');
  } catch(e) {
    errEl.textContent='Error al iniciar sesión'; errEl.classList.remove('hidden');
  } finally {
    btn.innerHTML = 'Iniciar sesión';
    btn.disabled = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('page-login') && !document.getElementById('page-login').classList.contains('hidden')) {
    doLogin();
  }
});

function doLogout() {
  localStorage.removeItem('notaria_session');
  APP.user = null;
  document.getElementById('page-app').classList.add('hidden');
  document.getElementById('page-login').classList.remove('hidden');
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
}

const APP = { user: null, route: 'dashboard' };

function showApp() {

  document.getElementById('user-initials').textContent = u.name.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2);

function navigate(route, params = {}) {
  APP.route = route;
  APP.params = params;
  document.querySelectorAll('.sidebar-link[data-route]').forEach(el => {
    el.classList.toggle('active', el.dataset.route === route.split('/')[0]);
  });
  renderPage(route, params);
}

function renderPage(route, params = {}) {
  const content = document.getElementById('content');
  const title = document.getElementById('page-title');
  const actions = document.getElementById('page-actions');
  actions.innerHTML = '';
  content.innerHTML = '<div class="flex items-center justify-center h-32 text-gray-400">Cargando...</div>';
  const r = route.split('/')[0];
  const titles = { dashboard:'Dashboard', instrumentos:'Instrumentos', plantillas:'Plantillas', usuarios:'Usuarios', configuracion:'Configuración', 'instrumento-form':'Instrumento' };
  title.textContent = titles[r] || r;
  switch(r) {
    case 'dashboard': renderDashboard(); break;
    case 'instrumentos': renderInstrumentos(); break;
    case 'instrumento-form': renderInstrumentoForm(params.id); break;
    case 'plantillas': renderPlantillas(); break;
    case 'usuarios': renderUsuarios(); break;
    case 'configuracion': renderConfiguracion(); break;
    default: content.innerHTML = '<p class="text-gray-500">Página no encontrada</p>';

}

function toast(msg, type = 'success') {
  const container = document.getElementById('toast');
  const el = document.createElement('div');
  el.className = 'toast-item';
  el.style.background = type === 'error' ? '#dc2626' : type === 'warning' ? '#d97706' : '#1f2937';
  el.textContent = msg;
  container.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 3500);
}

let currentFileData = null;
function handleFileDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
}
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}
function processFile(file) {
  if (!file.name.endsWith('.docx')) { toast('Solo se aceptan archivos .docx', 'error'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    currentFileData = { name: file.name, data: e.target.result };
    document.getElementById('file-name').textContent = file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)';
  };
  reader.readAsDataURL(file);
}

function detectarVariablesDeBase64(base64) {
  try {
    const b64 = base64.split(',')[1] || base64;
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const zip = new PizZip(bytes);
    let xml = '';
    ['word/document.xml','word/header1.xml','word/footer1.xml'].forEach(f => { if(zip.files[f]) xml += zip.files[f].asText(); });
    const re = /\{\{([^{}#/][^{}]*)\}\}/g;
    const vars = new Set();
    let m;
    while ((m = re.exec(xml)) !== null) vars.add(m[1].trim());
    return Array.from(vars);
  } catch(e) { return []; }
}

async function guardarPlantilla() {
  const nombre = document.getElementById('pla-nombre').value.trim();
  const tipo = document.getElementById('pla-tipo').value;
  if (!nombre) { toast('Ingresa un nombre para la plantilla', 'error'); return; }
  if (!currentFileData) { toast('Selecciona un archivo .docx', 'error'); return; }
  const btn = document.getElementById('btn-guardar-plantilla');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Guardando...';
  try {
    const variables = detectarVariablesDeBase64(currentFileData.data);
    const plantilla = { id: uid(), nombre, tipo, variables, fecha: new Date().toISOString(), contenido: currentFileData.data, nombreArchivo: currentFileData.name };
    DB.save('notaria_plantillas', plantilla);
    currentFileData = null;
    closeModal();
    toast('Plantilla guardada correctamente');
    renderPlantillas();
  } catch(e) { toast('Error al guardar plantilla: '+e.message, 'error'); }
  finally { btn.disabled=false; btn.innerHTML='Guardar Plantilla'; }
}

function switchTab(i) {
  FORM.activeTab = i;
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.querySelectorAll('[id^="tab-content-"]').forEach((c,j)=>c.classList.toggle('hidden',j!==i));
  if (i===3) renderSocios(APP.user.role!=='CONSULTA');
}

function actualizarCapitalLetra() {
  const cap = parseFloat(document.getElementById('f-capital')?.value||'0');
  const acc = parseInt(document.getElementById('f-acciones')?.value||'0');
  if (cap > 0) {
    document.getElementById('f-capital-letra').value = monedaALetra(cap);
    const prev = document.getElementById('capital-preview');
    if (prev) { prev.textContent = monedaALetra(cap); prev.classList.remove('hidden'); }
  }
  if (acc > 0) document.getElementById('f-acciones-letra').value = numeroALetra(acc) + (acc===1?' acción':' acciones');
}

function newSocio(idx) {
  return { _id: uid(), nombre_completo:'', genero:'masculino', nacionalidad:'mexicana', nacionalidad_padres:'mexicanos', lugar_nacimiento:'', fecha_nacimiento:'', estado_civil:'soltero', profesion:'', domicilio_calle:'', domicilio_numero:'', domicilio_colonia:'', domicilio_cp:'', domicilio_ciudad:'', domicilio_estado:'Estado de México', tipo_identificacion:'Credencial para Votar', autoridad_identificacion:'el Instituto Nacional Electoral', clave_elector:'', curp:'', rfc:'', numero_acciones:0, importe_acciones:0, anexo_identificacion:['D','E','F','G','H','I','J','K'][idx]||'D', texto_generales:'' };
}

function addSocio() {
  FORM.socios.push(newSocio(FORM.socios.length));
  renderSocios(true);
}
function removeSocio(idx) {
  if (FORM.socios.length <= 1) { toast('Debe haber al menos un socio', 'warning'); return; }
  FORM.socios.splice(idx,1);
  renderSocios(true);
}

function toggleSocio(idx) {
  const body = document.getElementById('socio-body-'+idx);
  body.classList.toggle('open');
  document.getElementById('socio-chevron-'+idx).style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
}

function renderSocios(canEdit) {
  const container = document.getElementById('socios-container');
  if (!container) return;
  container.innerHTML = FORM.socios.map((s,i) => renderSocioCard(s, i, canEdit)).join('');
  document.getElementById('socios-count').textContent = FORM.socios.length + ' socio(s)';
  actualizarTotales();
}

function updateSocio(idx, field, value) {
  FORM.socios[idx][field] = value;
  if (field === 'nombre_completo') {
    const el = document.getElementById('socio-nombre-display-'+idx);
    if (el) el.textContent = value || 'Socio '+(idx+1);
  }
}

function mostrarFechaLetra(idx) {
  const s = FORM.socios[idx];
  const el = document.getElementById('fecha-letra-'+idx);
  if (el && s.fecha_nacimiento) el.textContent = fechaALetra(s.fecha_nacimiento);
}

function actualizarTotales() {
  let totalAcc = 0, totalImp = 0;
  FORM.socios.forEach(s => { totalAcc += (parseInt(s.numero_acciones)||0); totalImp += (parseFloat(s.importe_acciones)||0); });
  const cap = parseFloat(document.getElementById('f-capital')?.value||'0');
  const elAcc = document.getElementById('total-acciones');
  const elImp = document.getElementById('total-importe');
  const elCap = document.getElementById('capital-declarado');
  if (elAcc) elAcc.textContent = totalAcc.toLocaleString();
  if (elImp) elImp.textContent = '$' + totalImp.toLocaleString(undefined,{minimumFractionDigits:2});
  if (elCap) elCap.textContent = '$' + cap.toLocaleString(undefined,{minimumFractionDigits:2});
}

function generarPreviewGenerales(idx) {
  const s = FORM.socios[idx];
  if (!s.nombre_completo || !s.fecha_nacimiento || !s.curp || !s.rfc) {
    toast('Completa nombre, fecha de nacimiento, CURP y RFC antes de generar el preview', 'warning');
    return;
  }
  const texto = generarTextoCuGenerales(s);
  FORM.socios[idx].texto_generales = texto;
  const el = document.getElementById('generales-preview-'+idx);
  if (el) { el.textContent = texto; el.classList.remove('hidden'); }
}

    descripcion_capital: document.getElementById('f-desc-capital')?.value||'',
    monto_capital: parseFloat(document.getElementById('f-capital')?.value||'0'),
    numero_acciones: parseInt(document.getElementById('f-acciones')?.value||'0'),
    valor_nominal: parseFloat(document.getElementById('f-valor-nominal')?.value||'0'),
    monto_capital_letra: document.getElementById('f-capital-letra')?.value||'',

  };
}

function guardarInstrumento(existingId) {
  const datos = recogerDatosFormulario();
  if (!datos.numero_instrumento) { toast('Ingresa el número de instrumento','error'); switchTab(0); return; }

  const id = existingId || uid();
  const instr = { id, ...datos, fechaCreacion: FORM.instrumento?.fechaCreacion || new Date().toISOString(), fechaActualizacion: new Date().toISOString(), docxBlob: FORM.instrumento?.docxBlob || null, creadoPor: APP.user.email };
  DB.save('notaria_instrumentos', instr);
  FORM.instrumento = instr;
  toast('Instrumento guardado');
  // Update page title and actions to reflect saved ID
  document.getElementById('page-title').textContent = 'Editar Instrumento';
  document.getElementById('page-actions').innerHTML = `
    <div class="flex gap-2">
      <button onclick="navigate('instrumentos')" class="btn btn-secondary">← Volver</button>
      <button onclick="guardarInstrumento('${id}')" id="btn-save" class="btn btn-primary">Guardar</button>
    </div>`;
  return id;
}

async function generarDocumentoFinal(existingId) {
  const savedId = guardarInstrumento(existingId);
  const id = savedId || existingId;
  const instr = DB.getOne('notaria_instrumentos', id);
  if (!instr) { toast('Guarda el instrumento primero', 'error'); return; }

  const plantilla = instr.plantilla_id ? DB.getOne('notaria_plantillas', instr.plantilla_id) : null;
  if (!plantilla) { toast('Selecciona una plantilla .docx en la pestaña "Instrumento"', 'error'); switchTab(0); return; }

  const btn = document.getElementById('btn-generar');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Generando...'; }

  try {
    if (!window.PizZip || !window.Docxtemplater) throw new Error('Librerías DOCX no cargadas. Verifica conexión a internet.');

    const fechaParts = parsearFechaInstrumento(instr.fecha_instrumento || new Date().toISOString().slice(0,10));

    // Build socios data
    const sociosData = (instr.socios||[]).map((s,i) => {
      const letrasAnexo = ['B','C','D','E','F','G','H','I','J'];
      return {
        ...s,
        texto_generales: s.texto_generales || generarTextoCuGenerales(s),
        fecha_nacimiento_letra: s.fecha_nacimiento ? fechaALetra(s.fecha_nacimiento) : '',
        curp_letra: caracteresALetra(s.curp||''),
        rfc_letra: caracteresALetra(s.rfc||''),
        rfc_socio: s.rfc||'',
        rfc_socio_escrito: caracteresALetra(s.rfc||''),
        clave_elector_letra: caracteresALetra(s.clave_elector||''),
        estado_civil: formatearEstadoCivil(s.estado_civil, s.genero),
        numero_acciones_letra: numeroALetra(parseInt(s.numero_acciones)||0) + ' ' + ((parseInt(s.numero_acciones)||0)===1?'acción':'acciones'),
        importe_acciones_letra: monedaALetra(parseFloat(s.importe_acciones)||0),
        anexo_constancia: letrasAnexo[i]||'D',
      };
    });

    const datos = {
      numero_instrumento: instr.numero_instrumento||'',
      numero_volumen: instr.numero_volumen||'',
      dia: fechaParts.dia,
      mes: fechaParts.mes,
      anio: fechaParts.anio,
      dia_letra: fechaParts.diaLetra,
      mes_letra: fechaParts.mesLetra,
      anio_letra: fechaParts.anioLetra,
      fecha_completa: fechaParts.completa,
      ciudad_otorgamiento: instr.ciudad_otorgamiento||'',
      nombre_empresa: instr.nombre_empresa||'',
      objeto_social: instr.objeto_social||'',
      duracion_sociedad: instr.duracion_sociedad||'',
      domicilio_social: instr.domicilio_social||'',
      monto_capital: instr.monto_capital?.toLocaleString()||'',
      monto_capital_letra: instr.monto_capital_letra || monedaALetra(instr.monto_capital||0),
      numero_acciones: instr.numero_acciones?.toString()||'',
      numero_acciones_letra: instr.numero_acciones_letra || numeroALetra(instr.numero_acciones||0)+' acciones',
      valor_nominal: instr.valor_nominal?.toLocaleString()||'',
      nombre_administrador: instr.nombre_administrador||'',
      nombre_comisario: instr.nombre_comisario||'',
      cargo_administrador: instr.cargo_administrador||'',
      duracion_cargo: instr.duracion_cargo||'',
      facultades_administrador: instr.facultades_administrador||'',
      socios: sociosData,
    };

    const blob = await generarDocxBrowser(plantilla.contenido, datos);

    // Store blob as base64
    const reader = new FileReader();
    reader.onload = e => {
      instr.docxBlob = e.target.result;
      instr.status = 'GENERADO';
      instr.fechaGeneracion = new Date().toISOString();
      DB.save('notaria_instrumentos', instr);
      FORM.instrumento = instr;

      // Download immediately
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'Instrumento_' + (instr.numero_instrumento||'documento').replace(/[^a-zA-Z0-9]/g,'_') + '.docx';
      a.click();

      const btnD = document.getElementById('btn-download');
      if (btnD) btnD.classList.remove('hidden');
      toast('Documento generado y descargado');
    };
    reader.readAsDataURL(blob);

  } catch(e) {
    console.error(e);
    toast('Error al generar: ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled=false; btn.innerHTML='<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg> Generar Documento .docx'; }
  }
}

function descargarInstrumento(id) {
  const instr = DB.getOne('notaria_instrumentos', id) || FORM.instrumento;
  if (!instr?.docxBlob) { toast('Genera el documento primero', 'warning'); return; }
  const a = document.createElement('a');
  a.href = instr.docxBlob;
  a.download = 'Instrumento_' + (instr.numero_instrumento||'documento').replace(/[^a-zA-Z0-9]/g,'_') + '.docx';
  a.click();
}

// ============================================================
// DOCX GENERATION (Browser)
// ============================================================
async function generarDocxBrowser(base64Content, datos) {
  const b64 = base64Content.includes(',') ? base64Content.split(',')[1] : base64Content;
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

  const zip = new PizZip(bytes);
  const doc = new Docxtemplater(zip, {
    delimiters: { start: '{{', end: '}}' },
    paragraphLoop: true,
    linebreaks: true,
    nullGetter: part => part.module ? '' : '{{' + part.value + '}}',
  });

  doc.render(datos);

  return doc.getZip().generate({
    type: 'blob',
    mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    compression: 'DEFLATE',
  });
}

function toggleUsuario(id) {
  const users = DB.get('notaria_users');
  const u = users.find(u=>u.id===id);
  if (!u) return;
  if (u.id === APP.user.id) { toast('No puedes desactivar tu propia cuenta','warning'); return; }
  u.active = !u.active;
  DB.set('notaria_users', users);
  toast('Usuario ' + (u.active?'activado':'desactivado'));
  renderUsuarios();
}

function showNuevoUsuario() {
  showModal(`<div class="modal p-6">

async function crearUsuario() {
  const name = document.getElementById('nu-name').value.trim();
  const email = document.getElementById('nu-email').value.trim();
  const pass = document.getElementById('nu-pass').value;
  const role = document.getElementById('nu-role').value;
  if (!name||!email||!pass) { toast('Completa todos los campos','error'); return; }
  const users = DB.get('notaria_users');
  if (users.find(u=>u.email===email)) { toast('El email ya existe','error'); return; }
  const hash = await sha256(pass);
  const user = { id:uid(), name, email, password:hash, role, active:true };
  DB.save('notaria_users', user);
  closeModal();
  toast('Usuario creado');
  renderUsuarios();
}

function showCambiarPassword(id) {
  showModal(`<div class="modal p-6">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-semibold">Cambiar Contraseña</h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">✕</button>
    </div>
    <div class="form-group"><label class="form-label required">Nueva contraseña</label><input id="cp-pass" class="form-input" type="password"></div>
    <div class="flex gap-3 justify-end">
      <button onclick="closeModal()" class="btn btn-secondary">Cancelar</button>
      <button onclick="cambiarPassword('${id}')" class="btn btn-primary">Guardar</button>
    </div>
  </div>`);
}

async function cambiarPassword(id) {
  const pass = document.getElementById('cp-pass').value;
  if (!pass || pass.length < 6) { toast('La contraseña debe tener al menos 6 caracteres','error'); return; }
  const users = DB.get('notaria_users');
  const u = users.find(u=>u.id===id);
  if (!u) return;
  u.password = await sha256(pass);
  DB.set('notaria_users', users);
  closeModal();
  toast('Contraseña actualizada');
}

function exportarDatos() {
  const data = {
    version: '1.0',
    fecha: new Date().toISOString(),
    notaria_users: DB.get('notaria_users'),
    notaria_plantillas: DB.get('notaria_plantillas'),
    notaria_instrumentos: DB.get('notaria_instrumentos'),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'notaria149_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('Datos exportados');
}

function importarDatos(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm('¿Importar datos? Esto reemplazará los datos actuales.')) return;
      if (data.notaria_users) DB.set('notaria_users', data.notaria_users);
      if (data.notaria_plantillas) DB.set('notaria_plantillas', data.notaria_plantillas);
      if (data.notaria_instrumentos) DB.set('notaria_instrumentos', data.notaria_instrumentos);
      toast('Datos importados correctamente');
      renderConfiguracion();
    } catch(err) { toast('Error al importar: archivo inválido', 'error'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

async function init() {
  await seedUsuarios();
  const session = DB.getObj('notaria_session');
  if (session) {
    const users = DB.get('notaria_users');
    const user = users.find(u => u.id === session.id && u.active);
    if (user) {
      APP.user = user;
      showApp();
      navigate('dashboard');
      return;
    }
  }
  document.getElementById('page-login').classList.remove('hidden');
}

window.addEventListener('load', init);
