<script>
// =====================================================================
// UTILIDADES
// =====================================================================
const UNIDADES=['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve'];
const DECENAS=['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
const CENTENAS=['','cien','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DIAS_L={1:'primero',2:'dos',3:'tres',4:'cuatro',5:'cinco',6:'seis',7:'siete',8:'ocho',9:'nueve',10:'diez',11:'once',12:'doce',13:'trece',14:'catorce',15:'quince',16:'dieciséis',17:'diecisiete',18:'dieciocho',19:'diecinueve',20:'veinte',21:'veintiuno',22:'veintidós',23:'veintitrés',24:'veinticuatro',25:'veinticinco',26:'veintiséis',27:'veintisiete',28:'veintiocho',29:'veintinueve',30:'treinta',31:'treinta y uno'};

function menorMil(n){if(!n)return'';if(n<20)return UNIDADES[n];if(n<100){const d=Math.floor(n/10),u=n%10;if(!u)return DECENAS[d];if(d===2)return'veinti'+UNIDADES[u];return DECENAS[d]+' y '+UNIDADES[u];}const c=Math.floor(n/100),r=n%100;if(n===100)return'cien';if(c===1)return r?'ciento '+menorMil(r):'cien';return CENTENAS[c]+(r?' '+menorMil(r):'');}
function decSimple(n){if(n<20)return UNIDADES[n];const d=Math.floor(n/10),u=n%10;if(!u)return DECENAS[d];if(d===2)return'veinti'+UNIDADES[u];return DECENAS[d]+' y '+UNIDADES[u];}
function anioL(a){if(a>=2000&&a<2100)return a===2000?'dos mil':'dos mil '+decSimple(a-2000);if(a>=1900&&a<2000)return a===1900?'mil novecientos':'mil novecientos '+decSimple(a-1900);return a.toString();}
function numeroALetra(num,fem=false){if(isNaN(num)||num===null)return'';if(num===0)return'cero';const neg=num<0,n=Math.abs(Math.floor(num));let r='';if(n>=1000000){const m=Math.floor(n/1000000),re=n%1000000;r=m===1?'un millón':menorMil(m)+' millones';if(re>0)r+=' '+numeroALetra(re,fem);}else if(n>=1000){const m=Math.floor(n/1000),re=n%1000;r=m===1?'mil':menorMil(m)+' mil';if(re>0)r+=' '+menorMil(re);}else r=menorMil(n);if(fem)r=r.replace(/\buno\b/g,'una').replace(/\bveintiuno\b/g,'veintiuna');return neg?'menos '+r:r;}
function monedaALetra(c){const e=Math.floor(c),ce=Math.round((c-e)*100);return numeroALetra(e)+' pesos '+ce.toString().padStart(2,'0')+'/100 moneda nacional';}
function caractL(t){const M={A:'A',B:'B',C:'C',D:'D',E:'E',F:'F',G:'G',H:'H',I:'I',J:'J',K:'K',L:'L',M:'M',N:'N','Ñ':'Ñ',O:'O',P:'P',Q:'Q',R:'R',S:'S',T:'T',U:'U',V:'V',W:'doble u',X:'X',Y:'Y',Z:'Z','0':'cero','1':'uno','2':'dos','3':'tres','4':'cuatro','5':'cinco','6':'seis','7':'siete','8':'ocho','9':'nueve'};return(t||'').toUpperCase().split('').map(c=>M[c]||c).join(', ');}
function fechaL(s){if(!s)return'';const d=new Date(s+'T12:00:00');return(DIAS_L[d.getDate()]||d.getDate())+' de '+MESES[d.getMonth()]+' de '+anioL(d.getFullYear());}
function parseFecha(s){if(!s)return{dia:'',mes:'',anio:'',diaLetra:'',mesLetra:'',anioLetra:'',completa:''};const d=new Date(s+'T12:00:00');return{dia:d.getDate().toString(),mes:MESES[d.getMonth()],anio:d.getFullYear().toString(),diaLetra:DIAS_L[d.getDate()]||d.getDate().toString(),mesLetra:MESES[d.getMonth()],anioLetra:anioL(d.getFullYear()),completa:fechaL(s)};}
function ecGen(ec,gen){const e=(ec||'').toLowerCase().trim();const m={soltero:'soltero',soltera:'soltero',casado:'casado',casada:'casado',divorciado:'divorciado',divorciada:'divorciado',viudo:'viudo',viuda:'viudo','unión libre':'en unión libre','union libre':'en unión libre'};const f={soltero:'soltera',soltera:'soltera',casado:'casada',casada:'casada',divorciado:'divorciada',divorciada:'divorciada',viudo:'viuda',viuda:'viuda','unión libre':'en unión libre','union libre':'en unión libre'};return(gen==='femenino'?f:m)[e]||ec;}
function generarGenerales(d){const fem=d.genero==='femenino';const orig=fem?'originaria':'originario';const dom=[d.domicilio_calle,d.domicilio_numero?'número '+d.domicilio_numero:'',d.domicilio_colonia?'Colonia '+d.domicilio_colonia:'',d.domicilio_cp?'Código Postal '+d.domicilio_cp:'',d.domicilio_ciudad?'en la ciudad de '+d.domicilio_ciudad:'',d.domicilio_estado].filter(Boolean).join(', ');const claveL=d.clave_elector?', con Clave de Elector: '+caractL(d.clave_elector):'';return(d.nombre_completo||'').toUpperCase()+', de nacionalidad '+(d.nacionalidad||'mexicana')+', de padres '+(d.nacionalidad_padres||'mexicanos')+', '+orig+' de '+(d.lugar_nacimiento||'')+', lugar donde nació el día '+fechaL(d.fecha_nacimiento)+', '+ecGen(d.estado_civil,d.genero)+', '+(d.profesion||'')+', con domicilio en '+dom+', quien se identifica con '+(d.tipo_identificacion||'Credencial para Votar')+' vigente expedida por '+(d.autoridad_identificacion||'el Instituto Nacional Electoral')+claveL+', la cual agrego en copia fotostática al apéndice de este instrumento con la letra que le "'+(d.anexo_identificacion||'D')+'", certificando que dicha copia es reproducción fiel y exacta de su original con el que fue debidamente cotejada; con Clave Única de Registro de Población: '+caractL(d.curp||'')+'; y con Registro Federal de Contribuyentes: '+caractL(d.rfc||'')+'.'}

// =====================================================================
// STORAGE
// =====================================================================
const DB={
  get:k=>{try{return JSON.parse(localStorage.getItem(k)||'[]')}catch{return[]}},
  getObj:k=>{try{return JSON.parse(localStorage.getItem(k)||'null')}catch{return null}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  one:(k,id)=>DB.get(k).find(i=>i.id===id),
  save:(k,item)=>{const a=DB.get(k),i=a.findIndex(x=>x.id===item.id);if(i>=0)a[i]=item;else a.push(item);DB.set(k,a);return item;},
  del:(k,id)=>DB.set(k,DB.get(k).filter(i=>i.id!==id))
};
function uid(){return crypto.randomUUID?crypto.randomUUID():'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});}

// =====================================================================
// AUTH
// =====================================================================
async function sha256(str){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

async function seedUsuarios(){
  if(DB.get('notaria_users').length>0)return;
  DB.set('notaria_users',[
    {id:uid(),name:'Admin',email:'admin@notaria149.mx',password:await sha256('Admin@Notaria2024'),role:'ADMIN',active:true},
    {id:uid(),name:'Capturista',email:'capturista@notaria149.mx',password:await sha256('Capturista@2024'),role:'CAPTURISTA',active:true},
    {id:uid(),name:'Consulta',email:'consulta@notaria149.mx',password:await sha256('Consulta@2024'),role:'CONSULTA',active:true},
  ]);
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  err.classList.add('hidden');
  if(!email||!pass){err.textContent='Ingresa correo y contraseña';err.classList.remove('hidden');return;}
  btn.innerHTML='<span class="spinner"></span> Verificando...';btn.disabled=true;
  try{
    const hash=await sha256(pass);
    const user=DB.get('notaria_users').find(u=>u.email===email&&u.password===hash&&u.active);
    if(!user){err.textContent='Credenciales incorrectas o usuario inactivo';err.classList.remove('hidden');return;}
    DB.set('notaria_session',user);APP.user=user;showApp();navigate('dashboard');

        <svg class="w-10 h-10 text-gray-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
        <p class="text-gray-500 text-sm">Arrastra un .docx aquí o <span class="text-blue-600">haz clic</span></p>

function hDrop(e){e.preventDefault();document.getElementById('dz').classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)procF(f);}
function hFS(e){const f=e.target.files[0];if(f)procF(f);}
function procF(file){
  if(!file.name.endsWith('.docx')){toast('Solo archivos .docx','error');return;}
  const r=new FileReader();
  r.onload=e=>{_fd={name:file.name,data:e.target.result};document.getElementById('fn').textContent=file.name+' ('+Math.round(file.size/1024)+' KB)';};
  r.readAsDataURL(file);
}
function detectVars(b64src){
  try{
    const b64=b64src.includes(',')?b64src.split(',')[1]:b64src;
    const bin=atob(b64);const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const zip=new PizZip(bytes);let xml='';
    ['word/document.xml','word/header1.xml','word/footer1.xml'].forEach(f=>{if(zip.files[f])xml+=zip.files[f].asText();});
    const re=/\{\{([^{}#/][^{}]*)\}\}/g;const s=new Set();let m;
    while((m=re.exec(xml))!==null)s.add(m[1].trim());return[...s];
  }catch{return[];}
}
async function guardarPlantilla(){
  const nombre=document.getElementById('pn').value.trim();
  if(!nombre){toast('Ingresa un nombre','error');return;}
  if(!_fd){toast('Selecciona un archivo .docx','error');return;}
  const btn=document.getElementById('bgp');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Guardando...';
  try{
    DB.save('notaria_plantillas',{id:uid(),nombre,tipo:document.getElementById('pt').value,variables:detectVars(_fd.data),fecha:new Date().toISOString(),contenido:_fd.data,nombreArchivo:_fd.name});
    _fd=null;closeModal();toast('Plantilla guardada');renderPlantillas();
  }catch(e){toast('Error: '+e.message,'error');}
  finally{btn.disabled=false;btn.innerHTML='Guardar';}
}

function recalcCap(){

async function generarDocFinal(existId){
  const savedId=guardarI(existId);
  if(!savedId)return;
  const instr=DB.one('notaria_instrumentos',savedId);
  if(!instr)return;
  if(!instr.plantilla_id){toast('Selecciona una plantilla .docx en la pestaña "1. Instrumento"','error');switchTab(0);return;}
  const plantilla=DB.one('notaria_plantillas',instr.plantilla_id);
  if(!plantilla){toast('Plantilla no encontrada','error');return;}
  if(typeof PizZip==='undefined'||typeof Docxtemplater==='undefined'){toast('Las librerías DOCX no cargaron. Verifica tu conexión a internet y recarga la página.','error');return;}

  const btn=document.getElementById('btn-gen');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Generando...';}
  try{
    const fp=parseFecha(instr.fecha_instrumento||new Date().toISOString().slice(0,10));
    const sociosData=(instr.socios||[]).map((s,i)=>({
      ...s,
      texto_generales:s.texto_generales||generarGenerales(s),
      fecha_nacimiento_letra:fechaL(s.fecha_nacimiento||''),
      curp_letra:caractL(s.curp||''),
      rfc_letra:caractL(s.rfc||''),
      rfc_socio:s.rfc||'',
      rfc_socio_escrito:caractL(s.rfc||''),
      clave_elector_letra:caractL(s.clave_elector||''),
      estado_civil:ecGen(s.estado_civil,s.genero),
      numero_acciones_letra:numeroALetra(parseInt(s.numero_acciones)||0)+((parseInt(s.numero_acciones)||0)===1?' acción':' acciones'),
      importe_acciones_letra:monedaALetra(parseFloat(s.importe_acciones)||0),
      anexo_constancia:ANEXOS[i]||'D',
    }));

    const datos={
      numero_instrumento:instr.numero_instrumento||'',numero_volumen:instr.numero_volumen||'',
      dia:fp.dia,mes:fp.mes,anio:fp.anio,dia_letra:fp.diaLetra,mes_letra:fp.mesLetra,anio_letra:fp.anioLetra,fecha_completa:fp.completa,
      ciudad_otorgamiento:instr.ciudad_otorgamiento||'',nombre_empresa:instr.nombre_empresa||'',objeto_social:instr.objeto_social||'',
      duracion_sociedad:instr.duracion_sociedad||'',domicilio_social:instr.domicilio_social||'',
      monto_capital:(instr.monto_capital||0).toLocaleString(),monto_capital_letra:instr.monto_capital_letra||monedaALetra(instr.monto_capital||0),
      numero_acciones:(instr.numero_acciones||0).toString(),numero_acciones_letra:instr.numero_acciones_letra||numeroALetra(instr.numero_acciones||0)+' acciones',
      valor_nominal:(instr.valor_nominal||0).toLocaleString(),
      nombre_administrador:instr.nombre_administrador||'',nombre_comisario:instr.nombre_comisario||'',
      cargo_administrador:instr.cargo_administrador||'',duracion_cargo:instr.duracion_cargo||'',
      facultades_administrador:instr.facultades_administrador||'',socios:sociosData,
    };

    const blob=await generarDocxBrowser(plantilla.contenido,datos);

    // Save to DB
    const reader=new FileReader();
    reader.onload=e=>{
      const upd=DB.one('notaria_instrumentos',savedId);
      if(upd){upd.docxBlob=e.target.result;upd.fechaGeneracion=new Date().toISOString();DB.save('notaria_instrumentos',upd);F.instr=JSON.parse(JSON.stringify(upd));}
      const bdl=document.getElementById('btn-dl');if(bdl)bdl.classList.remove('hidden');
    };
    reader.readAsDataURL(blob);

    // Download immediately
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='Instrumento_'+(instr.numero_instrumento||'doc').replace(/[^a-zA-Z0-9]/g,'_')+'.docx';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    toast('¡Documento generado y descargado!');
  }catch(e){
    console.error('DOCX error:',e);
    let msg=e.message||'Error desconocido';
    if(e.properties?.errors?.length)msg=e.properties.errors.map(er=>er.properties?.explanation||er.message).filter(Boolean).join(' | ');
    toast('Error al generar: '+msg,'error');
  }finally{
    if(btn){btn.disabled=false;btn.innerHTML='<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Generar y Descargar .docx';}
  }
}

async function generarDocxBrowser(base64Src,datos){
  const b64=base64Src.includes(',')?base64Src.split(',')[1]:base64Src;
  const bin=atob(b64);const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const zip=new PizZip(bytes);
  const doc=new Docxtemplater(zip,{paragraphLoop:true});
  try{doc.render(datos);}
  catch(err){
    if(err.properties?.errors?.length){const msg=err.properties.errors.map(e=>e.properties?.explanation||e.message).filter(Boolean).join('; ');throw new Error(msg||err.message);}
    throw err;
  }
  return doc.getZip().generate({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',compression:'DEFLATE'});
}

}
function togUser(id){const users=DB.get('notaria_users'),u=users.find(x=>x.id===id);if(!u)return;if(u.id===APP.user.id){toast('No puedes desactivar tu propia cuenta','warning');return;}u.active=!u.active;DB.set('notaria_users',users);toast(u.active?'Activado':'Desactivado');renderUsuarios();}
function showNuevoUser(){showModal(`<div class="modal p-6"><div class="flex items-center justify-between mb-5"><h2 class="text-lg font-semibold">Nuevo Usuario</h2><button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">✕</button></div><div class="form-group"><label class="form-label req">Nombre</label><input id="nu-n" class="form-input"></div><div class="form-group"><label class="form-label req">Email</label><input id="nu-e" class="form-input" type="email"></div><div class="form-group"><label class="form-label req">Contraseña</label><input id="nu-p" class="form-input" type="password"></div><div class="form-group"><label class="form-label">Rol</label><select id="nu-r" class="form-select"><option>ADMIN</option><option selected>CAPTURISTA</option><option>CONSULTA</option></select></div><div class="flex gap-3 justify-end"><button onclick="closeModal()" class="btn btn-secondary">Cancelar</button><button onclick="crearUser()" class="btn btn-primary">Crear</button></div></div>`);}
async function crearUser(){const n=document.getElementById('nu-n').value.trim(),e=document.getElementById('nu-e').value.trim(),p=document.getElementById('nu-p').value,r=document.getElementById('nu-r').value;if(!n||!e||!p){toast('Completa todos los campos','error');return;}if(DB.get('notaria_users').find(u=>u.email===e)){toast('El email ya existe','error');return;}DB.save('notaria_users',{id:uid(),name:n,email:e,password:await sha256(p),role:r,active:true});closeModal();toast('Usuario creado');renderUsuarios();}
function showCambiarPass(id){showModal(`<div class="modal p-6"><div class="flex items-center justify-between mb-5"><h2 class="text-lg font-semibold">Cambiar Contraseña</h2><button onclick="closeModal()" class="text-xl text-gray-400 hover:text-gray-600">✕</button></div><div class="form-group"><label class="form-label req">Nueva contraseña</label><input id="cp-p" class="form-input" type="password"></div><div class="flex gap-3 justify-end"><button onclick="closeModal()" class="btn btn-secondary">Cancelar</button><button onclick="cambiarPass('${id}')" class="btn btn-primary">Guardar</button></div></div>`);}
async function cambiarPass(id){const p=document.getElementById('cp-p').value;if(!p||p.length<6){toast('Mínimo 6 caracteres','error');return;}const users=DB.get('notaria_users'),u=users.find(x=>x.id===id);if(!u)return;u.password=await sha256(p);DB.set('notaria_users',users);closeModal();toast('Contraseña actualizada');}

// =====================================================================
// CONFIGURACIÓN
// =====================================================================
function renderConfiguracion(){
  document.getElementById('content').innerHTML=`
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="card p-5"><h2 class="font-semibold text-gray-900 mb-3">Notaría</h2><div class="space-y-2 text-sm"><p class="text-xs text-gray-500">Nombre</p><p class="font-medium">Notaría Ciento Cuarenta y Nueve</p><p class="text-xs text-gray-500 mt-2">Notario</p><p class="font-medium">Lic. José Manuel Gómez del Campo Gurza</p><p class="text-xs text-gray-500 mt-2">Sede</p><p class="font-medium">Metepec, Estado de México</p></div></div>
      <div class="card p-5"><h2 class="font-semibold text-gray-900 mb-3">Almacenamiento local</h2><div class="space-y-1 text-sm"><p class="text-gray-600">Plantillas: <strong>${DB.get('notaria_plantillas').length}</strong></p><p class="text-gray-600">Instrumentos: <strong>${DB.get('notaria_instrumentos').length}</strong></p><p class="text-amber-600 text-xs mt-2">⚠ Los datos viven en este navegador. Exporta regularmente para respaldar.</p></div></div>
      <div class="card p-5"><h2 class="font-semibold text-gray-900 mb-3">Motor DOCX</h2><div class="space-y-1 text-sm text-gray-600"><p>✓ docxtemplater + pizzip (CDN)</p><p>✓ Generación 100% en navegador</p><p>✓ Preservación total de formato Word</p><p>✓ Bloques repetibles {{#socios}}</p><p>✓ Placeholders fragmentados automáticos</p></div></div>
      <div class="card p-5"><h2 class="font-semibold text-gray-900 mb-3">Exportar / Importar</h2><div class="flex flex-col gap-2"><button onclick="exportar()" class="btn btn-secondary">⬇ Exportar todos los datos (.json)</button><button onclick="document.getElementById('impf').click()" class="btn btn-secondary">⬆ Importar datos (.json)</button><input id="impf" type="file" accept=".json" class="hidden" onchange="importar(event)"></div><p class="text-xs text-gray-400 mt-3">Incluye plantillas, instrumentos y usuarios. Para respaldar o migrar entre navegadores.</p></div>
    </div>
    <div class="card p-5"><h2 class="font-semibold text-gray-900 mb-3">Placeholders para machotes .docx</h2><div class="bg-gray-50 rounded-lg p-4 font-mono text-xs space-y-1 leading-relaxed"><p><span class="text-blue-600">{{numero_instrumento}}</span> · <span class="text-blue-600">{{numero_volumen}}</span></p><p><span class="text-blue-600">{{dia}}</span> · <span class="text-blue-600">{{mes}}</span> · <span class="text-blue-600">{{anio}}</span> · <span class="text-blue-600">{{fecha_completa}}</span></p><p><span class="text-blue-600">{{nombre_empresa}}</span> · <span class="text-blue-600">{{objeto_social}}</span> · <span class="text-blue-600">{{duracion_sociedad}}</span></p><p><span class="text-blue-600">{{monto_capital}}</span> · <span class="text-blue-600">{{monto_capital_letra}}</span></p><p><span class="text-blue-600">{{nombre_administrador}}</span> · <span class="text-blue-600">{{nombre_comisario}}</span></p><p class="text-gray-400 pt-1">— Bloque repetible —</p><p><span class="text-green-600">{{#socios}}</span></p><p class="pl-4"><span class="text-blue-600">{{nombre_completo}}</span> · <span class="text-blue-600">{{texto_generales}}</span></p><p class="pl-4"><span class="text-blue-600">{{rfc}}</span> · <span class="text-blue-600">{{curp}}</span> · <span class="text-blue-600">{{numero_acciones}}</span> · <span class="text-blue-600">{{importe_acciones}}</span></p><p><span class="text-green-600">{{/socios}}</span></p></div></div>`;
}
function exportar(){const data={version:'1.0',fecha:new Date().toISOString(),notaria_users:DB.get('notaria_users'),notaria_plantillas:DB.get('notaria_plantillas'),notaria_instrumentos:DB.get('notaria_instrumentos')};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='notaria149_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Datos exportados');}
function importar(event){const file=event.target.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{try{const data=JSON.parse(e.target.result);if(!confirm('¿Importar datos? Reemplazará los datos actuales.'))return;if(data.notaria_users)DB.set('notaria_users',data.notaria_users);if(data.notaria_plantillas)DB.set('notaria_plantillas',data.notaria_plantillas);if(data.notaria_instrumentos)DB.set('notaria_instrumentos',data.notaria_instrumentos);toast('Datos importados');renderConfiguracion();}catch{toast('Archivo inválido','error');}};r.readAsText(file);event.target.value='';}

// =====================================================================
// INIT
// =====================================================================
async function init(){
  await seedUsuarios();
  const session=DB.getObj('notaria_session');
  if(session){const user=DB.get('notaria_users').find(u=>u.id===session.id&&u.active);if(user){APP.user=user;showApp();navigate('dashboard');return;}}
  document.getElementById('page-login').classList.remove('hidden');
}
window.addEventListener('load',init);
</script>
</body>
</html>
