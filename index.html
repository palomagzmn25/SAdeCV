<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notaría 149 — Instrumentos Notariales</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.sl{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:14px;font-weight:500;color:#6b7280;cursor:pointer;transition:all .15s;}
.sl:hover{background:#f3f4f6;color:#111827;}
.sl.active{background:#eff6ff;color:#1d4ed8;}
.card{background:white;border-radius:12px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;outline:none;white-space:nowrap;transition:all .15s;}
.bp{background:#2563eb;color:white;}.bp:hover:not(:disabled){background:#1d4ed8;}.bp:disabled{background:#93c5fd;cursor:not-allowed;}
.bs{background:#f3f4f6;color:#374151;}.bs:hover{background:#e5e7eb;}
.bd{background:#fee2e2;color:#dc2626;}.bd:hover{background:#fecaca;}
.bg{background:#16a34a;color:white;}.bg:hover{background:#15803d;}
.bc{background:#0e7490;color:white;}.bc:hover{background:#0c6384;}
.bw{background:#f59e0b;color:white;}.bw:hover{background:#d97706;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;}
.fl.r::after{content:" *";color:#dc2626;}
.fi{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;color:#111827;outline:none;box-sizing:border-box;transition:border-color .15s;}
.fi:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fi.warn{border-color:#f59e0b;}
.fsl{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;color:#111827;outline:none;background:white;cursor:pointer;box-sizing:border-box;}
.fsl:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fta{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:14px;color:#111827;outline:none;resize:vertical;box-sizing:border-box;}
.fta:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.tb{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#6b7280;white-space:nowrap;}
.tb.active{background:#eff6ff;color:#1d4ed8;}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:9999px;font-size:12px;font-weight:500;}
.bg-b{background:#dbeafe;color:#1d4ed8;}.bg-g{background:#dcfce7;color:#15803d;}.bg-r{background:#f3f4f6;color:#374151;}.bg-y{background:#fef9c3;color:#854d0e;}.bg-p{background:#f3e8ff;color:#7e22ce;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;}
.md{background:white;border-radius:16px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.2);}
.al{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.al-e{background:#fee2e2;color:#dc2626;border:1px solid #fecaca;}
.al-w{background:#fef9c3;color:#854d0e;border:1px solid #fef08a;}
.al-i{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe;}
.tr:hover{background:#f9fafb;}
#toast{position:fixed;bottom:24px;right:24px;z-index:100;pointer-events:none;}
.ti{background:#1f2937;color:white;padding:12px 20px;border-radius:10px;font-size:14px;margin-top:8px;box-shadow:0 10px 25px rgba(0,0,0,.2);opacity:0;transform:translateY(20px);transition:all .3s;}
.ti.show{opacity:1;transform:translateY(0);}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.dz{border:2px dashed #d1d5db;border-radius:12px;padding:36px;text-align:center;cursor:pointer;transition:all .15s;}
.dz:hover,.dz.dov{border-color:#2563eb;background:#eff6ff;}
.sc{border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:10px;}
.sh{padding:12px 16px;background:#f9fafb;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.sb{padding:18px;display:none;}
.sb.open{display:block;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:640px){.g2,.g3{grid-template-columns:1fr;}}
.st{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid #f3f4f6;}
.st:first-child{margin-top:0;}
.hint{font-size:11px;color:#6b7280;margin-top:3px;}
.hint.warn{color:#d97706;}
</style>

<script>
// ─── LIBRERÍAS EMBEBIDAS INLINE (PizZip + Docxtemplater) ────────────────────
function ensureLibs(){return typeof PizZip!=='undefined'&&typeof Docxtemplater!=='undefined';}

// ─── UTILIDADES NUMÉRICAS / FECHA EN LETRA ───────────────────────────────────
const UN=['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve'];
const DEC=['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
const CEN=['','cien','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
const MES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DL={1:'primero',2:'dos',3:'tres',4:'cuatro',5:'cinco',6:'seis',7:'siete',8:'ocho',9:'nueve',10:'diez',11:'once',12:'doce',13:'trece',14:'catorce',15:'quince',16:'dieciséis',17:'diecisiete',18:'dieciocho',19:'diecinueve',20:'veinte',21:'veintiuno',22:'veintidós',23:'veintitrés',24:'veinticuatro',25:'veinticinco',26:'veintiséis',27:'veintisiete',28:'veintiocho',29:'veintinueve',30:'treinta',31:'treinta y uno'};

function m1k(n){if(!n)return'';if(n<20)return UN[n];if(n<100){const d=Math.floor(n/10),u=n%10;if(!u)return DEC[d];if(d===2)return'veinti'+UN[u];return DEC[d]+' y '+UN[u];}const c=Math.floor(n/100),r=n%100;if(n===100)return'cien';if(c===1)return r?'ciento '+m1k(r):'cien';return CEN[c]+(r?' '+m1k(r):'');}
function dSim(n){if(n<20)return UN[n];const d=Math.floor(n/10),u=n%10;if(!u)return DEC[d];if(d===2)return'veinti'+UN[u];return DEC[d]+' y '+UN[u];}
function aL(a){if(a>=2000&&a<2100)return a===2000?'dos mil':'dos mil '+dSim(a-2000);if(a>=1900&&a<2000)return a===1900?'mil novecientos':'mil novecientos '+dSim(a-1900);return a.toString();}
function numL(n,f=false){if(isNaN(n)||n===null)return'';if(n===0)return'cero';const neg=n<0,v=Math.abs(Math.floor(n));let r='';if(v>=1000000){const m=Math.floor(v/1e6),re=v%1e6;r=m===1?'un millón':m1k(m)+' millones';if(re)r+=' '+numL(re,f);}else if(v>=1000){const m=Math.floor(v/1000),re=v%1000;r=m===1?'mil':m1k(m)+' mil';if(re)r+=' '+m1k(re);}else r=m1k(v);if(f)r=r.replace(/\buno\b/g,'una').replace(/\bveintiuno\b/g,'veintiuna');return neg?'menos '+r:r;}
function monL(c){const e=Math.floor(c),ce=Math.round((c-e)*100);return numL(e)+' pesos '+ce.toString().padStart(2,'0')+'/100 moneda nacional';}
function cL(t){const M={A:'A',B:'B',C:'C',D:'D',E:'E',F:'F',G:'G',H:'H',I:'I',J:'J',K:'K',L:'L',M:'M',N:'N','Ñ':'Ñ',O:'O',P:'P',Q:'Q',R:'R',S:'S',T:'T',U:'U',V:'V',W:'doble u',X:'X',Y:'Y',Z:'Z','0':'cero','1':'uno','2':'dos','3':'tres','4':'cuatro','5':'cinco','6':'seis','7':'siete','8':'ocho','9':'nueve'};return(t||'').toUpperCase().split('').map(x=>M[x]||x).join(', ');}
function fechaL(s){if(!s)return'';const d=new Date(s+'T12:00:00');return(DL[d.getDate()]||d.getDate())+' de '+MES[d.getMonth()]+' de '+aL(d.getFullYear());}
function parsF(s){if(!s)return{dia:'',mes:'',anio:'',diaL:'',mesL:'',anioL:'',completa:''};const d=new Date(s+'T12:00:00');return{dia:d.getDate().toString(),mes:MES[d.getMonth()],anio:d.getFullYear().toString(),diaL:DL[d.getDate()]||d.getDate().toString(),mesL:MES[d.getMonth()],anioL:aL(d.getFullYear()),completa:fechaL(s)};}
function ecG(ec,gen){const e=(ec||'').toLowerCase().trim();const m={soltero:'soltero',soltera:'soltero',casado:'casado',casada:'casado',divorciado:'divorciado',divorciada:'divorciado',viudo:'viudo',viuda:'viudo','unión libre':'en unión libre','union libre':'en unión libre'};const f={soltero:'soltera',soltera:'soltera',casado:'casada',casada:'casada',divorciado:'divorciada',divorciada:'divorciada',viudo:'viuda',viuda:'viuda','unión libre':'en unión libre','union libre':'en unión libre'};return(gen==='femenino'?f:m)[e]||ec;}
function genGen(d){
  const fem=d.genero==='femenino',orig=fem?'originaria':'originario';
  const dom=[d.dom_calle,d.dom_numero?'número '+d.dom_numero:'',d.dom_colonia?'Colonia '+d.dom_colonia:'',d.dom_cp?'Código Postal '+d.dom_cp:'',d.dom_ciudad?'en la ciudad de '+d.dom_ciudad:'',d.dom_estado].filter(Boolean).join(', ');
  const ide=d.tipo_id||'Credencial para Votar';
  const aut=d.aut_id||'el Instituto Nacional Electoral';
  const claveL=d.clave_elector?', con Clave de Elector: '+cL(d.clave_elector):'';
  return(d.nombre_completo||'').toUpperCase()+', de nacionalidad '+(d.nacionalidad||'mexicana')+', de padres '+(d.nac_padres||'mexicanos')+', '+orig+' de '+(d.lugar_nac||'')+', lugar donde nació el día '+fechaL(d.fecha_nac)+', '+ecG(d.estado_civil,d.genero)+', '+(d.profesion||'')+', con domicilio en '+dom+', quien se identifica con '+ide+' vigente expedida por '+aut+claveL+', la cual agrego en copia fotostática al apéndice de este instrumento con la letra que le "'+(d.apendice||'D')+'", certificando que dicha copia es reproducción fiel y exacta de su original con el que fue debidamente cotejada; con Clave Única de Registro de Población: '+cL(d.curp||'')+'; y con Registro Federal de Contribuyentes: '+cL(d.rfc||'')+'.';
}

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const DB={
  get:k=>{try{return JSON.parse(localStorage.getItem(k)||'[]')}catch{return[];}},
  obj:k=>{try{return JSON.parse(localStorage.getItem(k)||'null')}catch{return null;}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  one:(k,id)=>DB.get(k).find(i=>i.id===id),
  save:(k,item)=>{const a=DB.get(k),i=a.findIndex(x=>x.id===item.id);if(i>=0)a[i]=item;else a.push(item);DB.set(k,a);return item;},
  del:(k,id)=>DB.set(k,DB.get(k).filter(i=>i.id!==id))
};
function uid(){return crypto.randomUUID?crypto.randomUUID():'xxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);});}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function sha(str){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
async function seedUsers(){

  DB.set('n_users',[

    {id:uid(),name:'Capturista',email:'capturista@notaria149.mx',password:await sha('Capturista@2024'),role:'CAPTURISTA',active:true},
    {id:uid(),name:'Consulta',email:'consulta@notaria149.mx',password:await sha('Consulta@2024'),role:'CONSULTA',active:true},

async function doLogin(){
  const email=document.getElementById('lemail').value.trim(),pass=document.getElementById('lpass').value;
  const err=document.getElementById('login-err'),btn=document.getElementById('lbtn');
  err.classList.add('hidden');
  if(!email||!pass){err.textContent='Ingresa correo y contraseña';err.classList.remove('hidden');return;}
  btn.innerHTML='<span class="sp"></span> Verificando...';btn.disabled=true;
  try{
    const h=await sha(pass),user=DB.get('n_users').find(u=>u.email===email&&u.password===h&&u.active);
    if(!user){err.textContent='Credenciales incorrectas o usuario inactivo';err.classList.remove('hidden');return;}
    DB.set('n_sess',user);APP.u=user;showApp();go('dashboard');
  }catch{err.textContent='Error al iniciar sesión';err.classList.remove('hidden');}
  finally{btn.innerHTML='Iniciar sesión';btn.disabled=false;}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!document.getElementById('pg-login').classList.contains('hidden'))doLogin();});
function doLogout(){localStorage.removeItem('n_sess');APP.u=null;document.getElementById('pg-app').classList.add('hidden');document.getElementById('pg-login').classList.remove('hidden');document.getElementById('lemail').value='';document.getElementById('lpass').value='';}

function toast(msg,type='ok'){
  const el=document.createElement('div');el.className='ti';
  el.style.background=type==='err'?'#dc2626':type==='warn'?'#d97706':type==='info'?'#2563eb':'#059669';
  el.textContent=msg;document.getElementById('toast').appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),300);},4000);
}

function hdrop(e){e.preventDefault();document.getElementById('dz').classList.remove('dov');const f=e.dataTransfer.files[0];if(f)procFile(f);}
function hfile(e){const f=e.target.files[0];if(f)procFile(f);}
function procFile(file){
  if(!file.name.endsWith('.docx')){toast('Solo archivos .docx','err');return;}
  const r=new FileReader();r.onload=e=>{_f={name:file.name,data:e.target.result};document.getElementById('fname').textContent=file.name+' ('+Math.round(file.size/1024)+' KB)';};r.readAsDataURL(file);
}
function detectVars(b64){
  try{
    const b=b64.includes(',')?b64.split(',')[1]:b64,bin=atob(b),bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const zip=new PizZip(bytes);let xml='';
    ['word/document.xml','word/header1.xml','word/footer1.xml'].forEach(f=>{if(zip.files[f])xml+=zip.files[f].asText();});
    const s=new Set();let m;const re=/\{\{([^{}#/][^{}]*)\}\}/g;while((m=re.exec(xml))!==null)s.add(m[1].trim());return[...s];
  }catch{return[];}
}
async function saveUpload(){
  const nombre=document.getElementById('pn').value.trim();
  if(!nombre){toast('Ingresa un nombre','err');return;}
  if(!_f){toast('Selecciona un .docx','err');return;}
  const btn=document.getElementById('bsave');btn.disabled=true;btn.innerHTML='<span class="sp"></span> Guardando...';
  try{
    const vars=detectVars(_f.data);
    DB.save('n_plant',{id:uid(),nombre,tipo:document.getElementById('pt').value,vars,fecha:new Date().toISOString(),data:_f.data,fname:_f.name});
    _f=null;cmodal();toast('Plantilla guardada');pgPlantillas();
  }catch(e){toast('Error: '+e.message,'err');}
  finally{btn.disabled=false;btn.innerHTML='Guardar';}
}

function filtI(){const q=(document.getElementById('qs').value||'').toLowerCase();let l=DB.get('n_instr');if(q)l=l.filter(i=>(i.numero_instrumento||'').toLowerCase().includes(q)||(i.nombre_empresa||'').toLowerCase().includes(q));document.getElementById('itbl').innerHTML=tblI(l);}

async function genDlI(id,btn){
  // Generar y/o descargar desde la lista
  const i=DB.one('n_instr',id);if(!i)return;
  if(i.docx){dlDocx(i);return;}
  // Si no tiene plantilla asignada, avisar
  if(!i.plantilla_id){toast('Este instrumento no tiene plantilla asignada. Ábrelo para asignar una.','warn');go('form-instr',{id});return;}
  const orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='<span class="sp"></span>';
  try{
    const blob=await buildDocx(i);
    guardarDocx(id,blob);
    dlDocx(DB.one('n_instr',id));
    // Refresh row
    const itbl=document.getElementById('itbl');if(itbl)itbl.innerHTML=tblI(DB.get('n_instr'));
    toast('Documento generado y descargado');
  }catch(e){toast('Error: '+e.message,'err');}
  finally{btn.disabled=false;btn.innerHTML=orig;}
}
function dlDocx(i){if(!i?.docx)return;const a=document.createElement('a');a.href=i.docx;a.download='Instrumento_'+(i.numero_instrumento||'doc').replace(/[^a-zA-Z0-9]/g,'_')+'.docx';a.click();}
function guardarDocx(id,blob){
  const r=new FileReader();
  r.onload=e=>{const i=DB.one('n_instr',id);if(i){i.docx=e.target.result;i.fechaGen=new Date().toISOString();DB.save('n_instr',i);}};
  r.readAsDataURL(blob);
}

function swTab(i){
  F.tab=i;
  document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.querySelectorAll('[id^="tc"]').forEach((c,j)=>c.classList.toggle('hidden',j!==i));
  if(i===3)renderSocios(APP.u.role!=='CONSULTA');
}
function recalc(){
  const cap=parseFloat(document.getElementById('f-capital')?.value||'0');
  const acc=parseInt(document.getElementById('f-acciones')?.value||'0');
  const nom=parseFloat(document.getElementById('f-nominal')?.value||'0');
  const hc=document.getElementById('h-cap'),ha=document.getElementById('h-acc'),hn=document.getElementById('h-nom');
  const cl=document.getElementById('f-cap-l'),al=document.getElementById('f-acc-l');
  if(hc&&cap>0)hc.textContent=monL(cap);
  if(ha&&acc>0)ha.textContent=numL(acc)+' acciones';
  if(hn&&nom>0)hn.textContent=monL(nom)+' por acción';
  if(cl&&cap>0&&!cl.value)cl.value=monL(cap);
  if(al&&acc>0&&!al.value)al.value=numL(acc)+' acciones';
  const cd=document.getElementById('cap-d');if(cd)cd.textContent='$'+cap.toLocaleString(undefined,{minimumFractionDigits:2});
}

function us(i,f,v){
  F.socios[i][f]=v;
  if(f==='nombre_completo'){const el=document.getElementById('sn'+i);if(el)el.textContent=v||'Socio '+(i+1);}
  if(f==='importe'){const h=document.getElementById('himp'+i);if(h)h.textContent=v>0?monL(v):'';}
}
function showFL(i){const el=document.getElementById('fl'+i);if(el&&F.socios[i].fecha_nac)el.textContent=fechaL(F.socios[i].fecha_nac);}
function chkLen(inp,min,msg,max){
  const l=inp.value.length;
  const ok=max?l>=min&&l<=max:l===min;
  inp.classList.toggle('warn',l>0&&!ok);
  // find sibling hint
  const next=inp.nextElementSibling;if(next&&next.classList.contains('hint'))next.textContent=l>0&&!ok?msg:'';
}
function calcTots(){
  let a=0,im=0;F.socios.forEach(s=>{a+=parseInt(s.num_acciones)||0;im+=parseFloat(s.importe)||0;});
  const ta=document.getElementById('tot-a'),ti=document.getElementById('tot-i');
  if(ta)ta.textContent=a.toLocaleString();if(ti)ti.textContent='$'+im.toLocaleString(undefined,{minimumFractionDigits:2});
}
function prevGen(i){
  const s=F.socios[i];
  const warn=[];
  if(!s.nombre_completo)warn.push('nombre');if(!s.fecha_nac)warn.push('fecha de nacimiento');if(!s.curp)warn.push('CURP');if(!s.rfc)warn.push('RFC');
  if(warn.length>0){toast('Faltan: '+warn.join(', ')+'. El texto se generará con los datos disponibles.','warn');}
  const t=genGen(s);F.socios[i].texto_generales=t;
  const el=document.getElementById('gp'+i);if(el){el.textContent=t;el.classList.remove('hidden');}
}

// ─── LEER FORMULARIO ─────────────────────────────────────────────────────────

  const cap=parseFloat(document.getElementById('f-capital')?.value||'0');
  const acc=parseInt(document.getElementById('f-acciones')?.value||'0');
  const nom=parseFloat(document.getElementById('f-nominal')?.value||'0');

    cud:document.getElementById('f-cud')?.value||'',
    fecha_cud:document.getElementById('f-fechacud')?.value||'',
    plantilla_id:document.getElementById('f-plantilla')?.value||'',
    objeto_social:document.getElementById('f-objeto')?.value||'',
    duracion_sociedad:document.getElementById('f-duracion')?.value||'',
    domicilio_social:document.getElementById('f-domicilio')?.value||'',

    valor_nominal:nom,

    nombre_comisario:document.getElementById('f-comisario')?.value||'',
    rfc_comisario:(document.getElementById('f-rfc-com')?.value||'').toUpperCase(),
    socios:JSON.parse(JSON.stringify(F.socios)),
  };
}

// ─── VALIDACIÓN SUAVE (notifica, no bloquea) ──────────────────────────────────
function validarSoft(datos){
  const warns=[];
  if(!datos.numero_instrumento)warns.push('Número de instrumento');
  if(!datos.fecha_instrumento)warns.push('Fecha de otorgamiento');
  if(!datos.nombre_empresa)warns.push('Nombre de la empresa');
  if(!datos.plantilla_id)warns.push('Plantilla .docx');
  if(!datos.objeto_social)warns.push('Objeto social');
  if(!datos.capital_minimo)warns.push('Capital mínimo fijo');
  datos.socios.forEach((s,i)=>{
    if(!s.nombre_completo)warns.push(`Socio ${i+1}: nombre`);
    if(s.curp&&s.curp.length!==18)warns.push(`Socio ${i+1}: CURP inválida`);
    if(s.rfc&&s.rfc.length<12)warns.push(`Socio ${i+1}: RFC inválido`);
  });
  if(!datos.nombre_administrador)warns.push('Nombre del Administrador');
  if(!datos.nombre_comisario)warns.push('Nombre del Comisario');
  if(warns.length>0)toast('⚠ Campos incompletos: '+warns.slice(0,3).join(', ')+(warns.length>3?` y ${warns.length-3} más`:''),'warn');
}

// ─── GUARDAR INSTRUMENTO ──────────────────────────────────────────────────────
function saveI(existId){
  const datos=leerForm();
  validarSoft(datos);
  const id=existId||uid();
  const prev=F.instr;
  const instr={id,...datos,creado:prev?.creado||new Date().toISOString(),actualizado:new Date().toISOString(),docx:prev?.docx||null,creadoPor:APP.u.email};
  DB.save('n_instr',instr);F.instr=JSON.parse(JSON.stringify(instr));
  const bdl=document.getElementById('btndl');if(bdl&&instr.docx)bdl.classList.remove('hidden');
  if(!existId){
    document.getElementById('pacts').innerHTML=`<div class="flex gap-2"><button onclick="go('instrumentos')" class="btn bs">← Volver</button><button onclick="saveI('${id}')" class="btn bp">💾 Guardar</button></div>`;
    // update inline button refs
    document.querySelectorAll('[onclick="saveI(\'\')"]').forEach(el=>el.setAttribute('onclick',`saveI('${id}')`));
    document.querySelectorAll('[onclick="genDoc(\'\')"]').forEach(el=>el.setAttribute('onclick',`genDoc('${id}')`));
    document.querySelectorAll('[onclick="reDescargar(\'\')"]').forEach(el=>el.setAttribute('onclick',`reDescargar('${id}')`));
  }
  toast('Guardado ✓');return id;
}

// ─── GENERAR DOCX ─────────────────────────────────────────────────────────────
async function genDoc(existId){
  const id=saveI(existId);if(!id)return;
  const instr=DB.one('n_instr',id);if(!instr)return;
  if(!instr.plantilla_id){toast('Selecciona una plantilla .docx en la pestaña "1. Instrumento"','warn');swTab(0);return;}
  const plant=DB.one('n_plant',instr.plantilla_id);
  if(!plant){toast('Plantilla no encontrada en tu navegador','err');return;}
  const btn=document.getElementById('btngen');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="sp"></span> Generando...';}
  try{
    const blob=await buildDocx(instr,plant);
    guardarDocx(id,blob);
    // descarga inmediata
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='Instrumento_'+(instr.numero_instrumento||'doc').replace(/[^a-zA-Z0-9]/g,'_')+'.docx';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    const bdl=document.getElementById('btndl');if(bdl)bdl.classList.remove('hidden');
    toast('¡Documento generado y descargado!');
  }catch(e){
    console.error(e);
    let msg=e.message||'Error desconocido';
    if(e.properties?.errors?.length)msg=e.properties.errors.map(er=>er.properties?.explanation||er.message).filter(Boolean).join(' | ');
    toast('Error al generar: '+msg,'err');
  }finally{
    if(btn){btn.disabled=false;btn.innerHTML='<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Generar y Descargar .docx';}
  }
}

async function buildDocx(instr,plant){
  // plant puede ser undefined si se llama desde lista con datos ya guardados
  if(!plant)plant=DB.one('n_plant',instr.plantilla_id);
  if(!plant)throw new Error('No se encontró la plantilla. Abre el instrumento y verifica que tiene plantilla asignada.');
  if(!ensureLibs())throw new Error('Las librerías DOCX no están disponibles. Recarga la página.');

  const fp=parsF(instr.fecha_instrumento);
  const fpCud=parsF(instr.fecha_cud);

  const sociosData=(instr.socios||[]).map((s,i)=>({
    nombre_completo:s.nombre_completo||'',
    nacionalidad:s.nacionalidad||'mexicana',
    nac_padres:s.nac_padres||'mexicanos',
    lugar_nacimiento:s.lugar_nac||'',
    fecha_nacimiento:s.fecha_nac||'',
    fecha_nacimiento_letra:fechaL(s.fecha_nac||''),
    estado_civil:ecG(s.estado_civil,s.genero),
    genero:s.genero||'masculino',
    profesion:s.profesion||'',
    domicilio_completo:[s.dom_calle,s.dom_numero?'núm.'+s.dom_numero:'',s.dom_colonia?'Col.'+s.dom_colonia:'',s.dom_cp?'C.P.'+s.dom_cp:'',s.dom_ciudad,s.dom_estado].filter(Boolean).join(', '),
    dom_calle:s.dom_calle||'',dom_numero:s.dom_numero||'',dom_colonia:s.dom_colonia||'',dom_cp:s.dom_cp||'',dom_ciudad:s.dom_ciudad||'',dom_estado:s.dom_estado||'',
    tipo_identificacion:s.tipo_id||'Credencial para Votar',
    autoridad_identificacion:s.aut_id||'',
    clave_elector:s.clave_elector||'',clave_elector_letra:cL(s.clave_elector||''),
    apendice:s.apendice||APD[i]||'D',
    curp:s.curp||'',curp_letra:cL(s.curp||''),
    rfc:s.rfc||'',rfc_letra:cL(s.rfc||''),
    numero_acciones:(parseInt(s.num_acciones)||0).toString(),
    numero_acciones_letra:numL(parseInt(s.num_acciones)||0)+((parseInt(s.num_acciones)||0)===1?' acción':' acciones'),
    importe_acciones:(parseFloat(s.importe)||0).toLocaleString(),
    importe_acciones_letra:monL(parseFloat(s.importe)||0),
    texto_generales:s.texto_generales||genGen(s),
  }));

  const datos={
    numero_instrumento:instr.numero_instrumento||'',
    numero_volumen:instr.numero_volumen||'',
    numero_folios:instr.numero_folios||'',
    dia:fp.dia, mes:fp.mes, anio:fp.anio,
    dia_letra:fp.diaL, mes_letra:fp.mesL, anio_letra:fp.anioL,
    fecha_completa:fp.completa,
    nombre_empresa:instr.nombre_empresa||'',
    cud:instr.cud||'',
    fecha_cud:fpCud.completa||instr.fecha_cud||'',
    duracion_sociedad:instr.duracion_sociedad||'',
    domicilio_social:instr.domicilio_social||'',
    objeto_social:instr.objeto_social||'',
    capital_minimo:(instr.capital_minimo||0).toLocaleString(),
    capital_minimo_letra:instr.capital_minimo_letra||monL(instr.capital_minimo||0),
    numero_acciones:(instr.numero_acciones||0).toString(),
    numero_acciones_letra:instr.numero_acciones_letra||numL(instr.numero_acciones||0)+' acciones',
    valor_nominal:(instr.valor_nominal||0).toLocaleString(),
    valor_nominal_letra:instr.valor_nominal_letra||monL(instr.valor_nominal||0),
    nombre_administrador:instr.nombre_administrador||'',
    rfc_administrador:instr.rfc_administrador||'',
    rfc_administrador_letra:cL(instr.rfc_administrador||''),
    nombre_comisario:instr.nombre_comisario||'',
    rfc_comisario:instr.rfc_comisario||'',
    rfc_comisario_letra:cL(instr.rfc_comisario||''),
    socios:sociosData,
  };

  const b64=plant.data.includes(',')?plant.data.split(',')[1]:plant.data;
  const bin=atob(b64);const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const zip=new PizZip(bytes);
  const doc=new Docxtemplater(zip,{paragraphLoop:true});
  try{doc.render(datos);}
  catch(err){
    if(err.properties?.errors?.length){const m=err.properties.errors.map(e=>e.properties?.explanation||e.message).filter(Boolean).join('; ');throw new Error(m||err.message);}
    throw err;
  }
  return doc.getZip().generate({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',compression:'DEFLATE'});
}

function reDescargar(id){
  const i=DB.one('n_instr',id)||(F.instr?.id===id?F.instr:null);
  if(!i?.docx){toast('Sin documento generado aún','warn');return;}
  const a=document.createElement('a');a.href=i.docx;a.download='Instrumento_'+(i.numero_instrumento||'doc').replace(/[^a-zA-Z0-9]/g,'_')+'.docx';a.click();
}

// ─── USUARIOS ─────────────────────────────────────────────────────────────────
function pgUsuarios(){
  if(APP.u.role!=='ADMIN'){document.getElementById('content').innerHTML='<p class="text-gray-500">Sin acceso</p>';return;}
  const users=DB.get('n_users');
  document.getElementById('pacts').innerHTML=`<button onclick="showNewUser()" class="btn bp">+ Nuevo Usuario</button>`;
  document.getElementById('content').innerHTML=`<div class="card"><table class="w-full text-sm"><thead><tr class="text-left text-xs text-gray-500 border-b border-gray-200 bg-gray-50">
    <th class="px-5 py-3">Nombre</th><th class="px-5 py-3">Email</th><th class="px-5 py-3">Rol</th><th class="px-5 py-3">Estado</th><th class="px-5 py-3"></th>
  </tr></thead><tbody>
  ${users.map(u=>`<tr class="tr border-b border-gray-100">
    <td class="px-5 py-3 font-medium">${u.name}</td><td class="px-5 py-3 text-gray-500">${u.email}</td>
    <td class="px-5 py-3"><span class="badge ${u.role==='ADMIN'?'bg-p':u.role==='CAPTURISTA'?'bg-b':'bg-r'}">${u.role}</span></td>
    <td class="px-5 py-3"><span class="badge ${u.active?'bg-g':'bg-r'}">${u.active?'Activo':'Inactivo'}</span></td>
    <td class="px-5 py-3"><div class="flex gap-1 justify-end">
      <button onclick="togUser('${u.id}')" class="btn bs text-xs py-1 px-3">${u.active?'Desactivar':'Activar'}</button>
      ${u.id!==APP.u.id?`<button onclick="showChgPass('${u.id}')" class="btn bs text-xs py-1 px-3">Contraseña</button>`:''}
    </div></td>
  </tr>`).join('')}</tbody></table></div>`;
}
function togUser(id){const users=DB.get('n_users'),u=users.find(x=>x.id===id);if(!u||u.id===APP.u.id){toast('No puedes modificar tu propia cuenta','warn');return;}u.active=!u.active;DB.set('n_users',users);toast(u.active?'Activado':'Desactivado');pgUsuarios();}
function showNewUser(){modal(`<div class="md p-6"><div class="flex items-center justify-between mb-4"><h2 class="text-lg font-semibold">Nuevo Usuario</h2><button onclick="cmodal()" class="text-xl text-gray-400">✕</button></div><div class="fg"><label class="fl r">Nombre</label><input id="un" class="fi"></div><div class="fg"><label class="fl r">Email</label><input id="ue" class="fi" type="email"></div><div class="fg"><label class="fl r">Contraseña</label><input id="up" class="fi" type="password"></div><div class="fg"><label class="fl">Rol</label><select id="ur" class="fsl"><option>ADMIN</option><option selected>CAPTURISTA</option><option>CONSULTA</option></select></div><div class="flex gap-3 justify-end"><button onclick="cmodal()" class="btn bs">Cancelar</button><button onclick="createUser()" class="btn bp">Crear</button></div></div>`);}
async function createUser(){const n=document.getElementById('un').value.trim(),e=document.getElementById('ue').value.trim(),p=document.getElementById('up').value,r=document.getElementById('ur').value;if(!n||!e||!p){toast('Completa todos los campos','err');return;}if(DB.get('n_users').find(u=>u.email===e)){toast('Email ya existe','err');return;}DB.save('n_users',{id:uid(),name:n,email:e,password:await sha(p),role:r,active:true});cmodal();toast('Usuario creado');pgUsuarios();}
function showChgPass(id){modal(`<div class="md p-6"><div class="flex items-center justify-between mb-4"><h2 class="text-lg font-semibold">Cambiar Contraseña</h2><button onclick="cmodal()" class="text-xl text-gray-400">✕</button></div><div class="fg"><label class="fl r">Nueva contraseña</label><input id="cp" class="fi" type="password"></div><div class="flex gap-3 justify-end"><button onclick="cmodal()" class="btn bs">Cancelar</button><button onclick="chgPass('${id}')" class="btn bp">Guardar</button></div></div>`);}
async function chgPass(id){const p=document.getElementById('cp').value;if(!p||p.length<6){toast('Mínimo 6 caracteres','err');return;}const users=DB.get('n_users'),u=users.find(x=>x.id===id);if(!u)return;u.password=await sha(p);DB.set('n_users',users);cmodal();toast('Contraseña actualizada');}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  await seedUsers();
  const sess=DB.obj('n_sess');
  if(sess){const user=DB.get('n_users').find(u=>u.id===sess.id&&u.active);if(user){APP.u=user;showApp();go('dashboard');return;}}
  document.getElementById('pg-login').classList.remove('hidden');
}
window.addEventListener('load',init);
</script>
